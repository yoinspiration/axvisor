name: Test for QEMU

on: [push, pull_request, workflow_dispatch]

jobs:
  test-qemu:
    name: "Test qemu: ${{ matrix.arch }} - ${{ matrix.case_name }}"
    strategy:
      matrix:
        include:
          - case_id: qemu-aarch64-arceos
            case_name: ArceOS
            arch: aarch64
            vmconfigs: configs/vms/arceos-aarch64-qemu-smp1.toml
            vmimage_name: qemu_aarch64_arceos
          - case_id: qemu-aarch64-linux
            case_name: Linux
            arch: aarch64
            vmconfigs: configs/vms/linux-aarch64-qemu-smp1.toml
            vmimage_name: qemu_aarch64_linux
          - case_id: qemu-x86_64-nimbos
            case_name: NimbOS
            arch: x86_64
            vmconfigs: configs/vms/nimbos-x86_64-qemu-smp1.toml
            vmimage_name: qemu_x86_64_nimbos
      fail-fast: false
    runs-on:
      - self-hosted
      - linux
      - intel

    steps:
      - name: Clean up workspace
        run: |
          [ -d .git ] && git submodule deinit -f . || true
          [ -d .git/modules ] && rm -rf .git/modules || true
          [ -d .git ] && git clean -ffdx || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive

      - name: Run CI suite
        id: run_suite
        continue-on-error: true
        env:
          CI_SCENARIO: qemu
          CI_CASE_ID: ${{ matrix.case_id }}
          CI_CASE_NAME: ${{ matrix.case_name }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_VMCONFIGS: ${{ matrix.vmconfigs }}
          MATRIX_VMIMAGE_NAME: ${{ matrix.vmimage_name }}
        run: bash scripts/ci/run_ci_suite.sh

      - name: Analyze test results
        id: analyze
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/ci/analyze_ci_results.py --artifact-dir ci-artifacts --fail-on-error

      - name: Publish summary
        if: always()
        run: |
          if [ -f ci-artifacts/report/summary.md ]; then
            cat ci-artifacts/report/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-qemu-${{ matrix.case_id }}
          path: ci-artifacts
          if-no-files-found: warn

      - name: Check suite status
        if: always()
        run: |
          if [ "${{ steps.run_suite.outcome }}" = "failure" ]; then
            echo "CI suite failed"
            exit 1
          fi
          if [ "${{ steps.analyze.outcome }}" = "failure" ]; then
            echo "Result analysis reported failures"
            exit 1
          fi

