name: Test for BOARD

on: [push, pull_request, workflow_dispatch]

jobs:
  test-board:
    name: "Test board: ${{ matrix.board }} - ${{ matrix.case_name }}"
    strategy:
      matrix:
        include:
          - case_id: board-phytiumpi-arceos
            case_name: ArceOS
            board: phytiumpi
            vmconfigs: configs/vms/arceos-aarch64-e2000-smp1.toml
          - case_id: board-phytiumpi-linux
            case_name: Linux
            board: phytiumpi
            vmconfigs: configs/vms/linux-aarch64-e2000-smp1.toml
          - case_id: board-roc-rk3568-pc-arceos
            case_name: ArceOS
            board: roc-rk3568-pc
            vmconfigs: configs/vms/arceos-aarch64-rk3568-smp1.toml
          - case_id: board-roc-rk3568-pc-linux
            case_name: Linux
            board: roc-rk3568-pc
            vmconfigs: configs/vms/linux-aarch64-rk3568-smp1.toml
      fail-fast: false
    runs-on:
      - self-hosted
      - linux
      - ${{ matrix.board }}

    steps:
      - name: Clean up workspace
        run: |
          [ -d .git ] && git submodule deinit -f . || true
          [ -d .git/modules ] && rm -rf .git/modules || true
          [ -d .git ] && git clean -ffdx || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          submodules: recursive

      - name: Run CI suite
        id: run_suite
        continue-on-error: true
        env:
          CI_SCENARIO: board
          CI_CASE_ID: ${{ matrix.case_id }}
          CI_CASE_NAME: ${{ matrix.case_name }}
          MATRIX_BOARD: ${{ matrix.board }}
          MATRIX_VMCONFIGS: ${{ matrix.vmconfigs }}
        run: bash scripts/ci/run_ci_suite.sh

      - name: Analyze test results
        id: analyze
        if: always()
        continue-on-error: true
        run: |
          python3 scripts/ci/analyze_ci_results.py --artifact-dir ci-artifacts --fail-on-error

      - name: Publish summary
        if: always()
        run: |
          if [ -f ci-artifacts/report/summary.md ]; then
            cat ci-artifacts/report/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-board-${{ matrix.case_id }}
          path: ci-artifacts
          if-no-files-found: warn

      - name: Check suite status
        if: always()
        run: |
          if [ "${{ steps.run_suite.outcome }}" = "failure" ]; then
            echo "CI suite failed"
            exit 1
          fi
          if [ "${{ steps.analyze.outcome }}" = "failure" ]; then
            echo "Result analysis reported failures"
            exit 1
          fi
